<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Design canvas -->
  <rect x="200" y="60" width="400" height="320" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <!-- Grid lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <line x1="200" y1="140" x2="600" y2="140"/><line x1="200" y1="220" x2="600" y2="220"/>
    <line x1="200" y1="300" x2="600" y2="300"/>
    <line x1="300" y1="60" x2="300" y2="380"/><line x1="400" y1="60" x2="400" y2="380"/>
    <line x1="500" y1="60" x2="500" y2="380"/>
  </g>
  <!-- Logo shape -->
  <polygon points="400,120 460,200 440,200 440,280 360,280 360,200 340,200" fill="none" stroke="url(#lg)" stroke-width="3"/>
  <circle cx="400" cy="210" r="25" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <!-- Color palette -->
  <circle cx="240" cy="420" r="18" fill="#f59e0b"/><circle cx="290" cy="420" r="18" fill="#fbbf24"/>
  <circle cx="340" cy="420" r="18" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
  <circle cx="390" cy="420" r="18" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
  <!-- Tools sidebar -->
  <rect x="640" y="100" width="40" height="40" rx="5" fill="#334155" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <rect x="640" y="150" width="40" height="40" rx="5" fill="#334155" opacity="0.3"/>
  <rect x="640" y="200" width="40" height="40" rx="5" fill="#334155" opacity="0.3"/>
  <!-- Pen tool icon -->
  <path d="M655 115 L665 130 L660 135 L650 125 Z" fill="#f59e0b" opacity="0.7"/>
  <!-- Sparkles -->
  <circle cx="480" cy="130" r="3" fill="#fbbf24" opacity="0.5"/>
  <circle cx="330" cy="150" r="2" fill="#f59e0b" opacity="0.4"/>
</svg>
