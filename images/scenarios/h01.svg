<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Echo chamber bubble -->
  <ellipse cx="400" cy="250" rx="250" ry="180" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.2"/>
  <ellipse cx="400" cy="250" rx="220" ry="155" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.15"/>
  <!-- Person on left -->
  <circle cx="250" cy="200" r="30" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="250" y1="230" x2="250" y2="310" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="250" y1="260" x2="220" y2="290" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="250" y1="260" x2="280" y2="290" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- Speech bubble from person -->
  <rect x="290" y="140" width="120" height="35" rx="8" fill="#0ea5e9" opacity="0.2"/>
  <text x="350" y="162" font-family="Arial" font-size="11" fill="#0ea5e9" text-anchor="middle">I think X...</text>
  <!-- AI on right -->
  <rect x="490" y="180" width="70" height="60" rx="12" fill="none" stroke="#0ea5e9" stroke-width="2.5"/>
  <circle cx="510" cy="205" r="6" fill="#0ea5e9"/><circle cx="540" cy="205" r="6" fill="#0ea5e9"/>
  <path d="M510 225 Q525 235 540 225" fill="none" stroke="#0ea5e9" stroke-width="2"/>
  <!-- AI agreeing -->
  <rect x="420" y="260" width="150" height="35" rx="8" fill="#334155" stroke="#0ea5e9" stroke-width="1"/>
  <text x="495" y="282" font-family="Arial" font-size="11" fill="#0ea5e9" text-anchor="middle">Yes, X is correct!</text>
  <!-- Circular arrows (echo) -->
  <path d="M350 320 Q400 370 450 320" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.3"/>
  <polygon points="447,326 458,320 450,313" fill="#0ea5e9" opacity="0.3"/>
  <path d="M450 190 Q400 140 350 190" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.3"/>
  <polygon points="353,184 342,190 350,197" fill="#0ea5e9" opacity="0.3"/>
  <!-- Echo text repeating -->
  <text x="400" y="400" font-family="Arial" font-size="10" fill="#0ea5e9" text-anchor="middle" opacity="0.3">X... X... X...</text>
  <!-- Warning -->
  <rect x="250" y="430" width="300" height="40" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="455" font-family="Arial" font-size="11" fill="#f59e0b" text-anchor="middle" opacity="0.6">Confirmation Bias Loop</text>
</svg>
