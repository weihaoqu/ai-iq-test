<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Human figure -->
  <circle cx="280" cy="160" r="35" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="280" y1="195" x2="280" y2="300" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="280" y1="230" x2="240" y2="280" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="280" y1="230" x2="320" y2="270" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="280" y1="300" x2="250" y2="370" stroke="#94a3b8" stroke-width="2.5"/>
  <line x1="280" y1="300" x2="310" y2="370" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- Robot figure -->
  <rect x="490" y="130" width="60" height="60" rx="10" fill="none" stroke="#6366f1" stroke-width="2.5"/>
  <circle cx="505" cy="155" r="6" fill="#6366f1"/><circle cx="535" cy="155" r="6" fill="#6366f1"/>
  <rect x="510" y="170" width="20" height="4" rx="2" fill="#6366f1" opacity="0.6"/>
  <rect x="500" y="195" width="40" height="60" rx="5" fill="none" stroke="#6366f1" stroke-width="2.5"/>
  <line x1="500" y1="220" x2="470" y2="260" stroke="#6366f1" stroke-width="2.5"/>
  <line x1="540" y1="220" x2="570" y2="260" stroke="#6366f1" stroke-width="2.5"/>
  <line x1="505" y1="255" x2="495" y2="330" stroke="#6366f1" stroke-width="2.5"/>
  <line x1="535" y1="255" x2="545" y2="330" stroke="#6366f1" stroke-width="2.5"/>
  <!-- Antenna -->
  <line x1="520" y1="130" x2="520" y2="110" stroke="#6366f1" stroke-width="2"/>
  <circle cx="520" cy="106" r="5" fill="#818cf8"/>
  <!-- Handshake / collaboration -->
  <path d="M320 270 Q380 290 400 280 Q420 270 470 260" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-dasharray="6 3"/>
  <!-- Shared work surface -->
  <rect x="330" y="340" width="140" height="80" rx="8" fill="#334155" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <rect x="350" y="355" width="60" height="5" rx="2" fill="#6366f1" opacity="0.4"/>
  <rect x="350" y="368" width="80" height="5" rx="2" fill="#818cf8" opacity="0.3"/>
  <rect x="350" y="381" width="50" height="5" rx="2" fill="#6366f1" opacity="0.4"/>
  <!-- Gears -->
  <circle cx="400" y="420" r="20" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
</svg>
