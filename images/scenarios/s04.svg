  <rect x="430" y="60" width="310" height="340" rx="12" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
  <rect x="450" y="80" width="80" height="25" rx="5" fill="#a78bfa" opacity="0.3"/>
  <text x="490" y="97" font-family="Arial" font-size="12" fill="#a78bfa" text-anchor="middle">Bot B</text>
  <!-- Vague response -->
  <rect x="450" y="120" width="270" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="450" y="138" width="250" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="450" y="156" width="230" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
