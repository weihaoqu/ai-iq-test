<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/><stop offset="100%" stop-color="#818cf8" stop-opacity="0.1"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- AI chip/brain on left -->
  <rect x="120" y="180" width="120" height="120" rx="20" fill="none" stroke="#6366f1" stroke-width="2.5"/>
  <circle cx="180" cy="240" r="30" fill="none" stroke="#818cf8" stroke-width="2"/>
  <circle cx="180" cy="240" r="12" fill="#6366f1" opacity="0.6"/>
  <!-- Chip pins -->
  <line x1="140" y1="180" x2="140" y2="160" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  <line x1="180" y1="180" x2="180" y2="160" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="180" x2="220" y2="160" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  <line x1="140" y1="300" x2="140" y2="320" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  <line x1="180" y1="300" x2="180" y2="320" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="300" x2="220" y2="320" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  <!-- Arrow/flow -->
  <path d="M260 240 L380 240" stroke="#6366f1" stroke-width="2" stroke-dasharray="8 4" opacity="0.6"/>
  <polygon points="380,230 400,240 380,250" fill="#6366f1" opacity="0.6"/>
  <!-- Canvas/easel -->
  <rect x="420" y="100" width="260" height="300" rx="5" fill="url(#canvas)" stroke="#6366f1" stroke-width="2"/>
  <!-- Painting content - landscape -->
  <circle cx="500" cy="180" r="30" fill="#fbbf24" opacity="0.6"/>
  <path d="M420 300 L480 220 L530 270 L580 200 L650 280 L680 300" fill="none" stroke="#34d399" stroke-width="2" opacity="0.6"/>
  <path d="M420 320 L480 250 L530 290 L580 230 L650 300 L680 320" fill="#34d399" opacity="0.15"/>
  <!-- Sparkle effects -->
  <circle cx="450" cy="140" r="3" fill="#818cf8" opacity="0.6"/>
  <circle cx="640" cy="150" r="2" fill="#6366f1" opacity="0.5"/>
  <circle cx="660" cy="360" r="3" fill="#818cf8" opacity="0.4"/>
  <!-- Paintbrush -->
  <line x1="390" y1="380" x2="440" y2="340" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="440" cy="340" r="6" fill="#f59e0b" opacity="0.7"/>
</svg>
