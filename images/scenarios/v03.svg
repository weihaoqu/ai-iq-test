<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Laptop at bottom -->
  <rect x="250" y="350" width="180" height="100" rx="8" fill="#334155" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="260" y="360" width="160" height="70" rx="3" fill="#0f172a"/>
  <rect x="275" y="375" width="80" height="6" rx="2" fill="#f97316" opacity="0.4"/>
  <rect x="275" y="388" width="60" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="200" y="450" width="280" height="10" rx="3" fill="#475569"/>
  <!-- Upload arrow -->
  <line x1="340" y1="340" x2="340" y2="240" stroke="#f97316" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.6"/>
  <polygon points="330,245 340,220 350,245" fill="#f97316" opacity="0.6"/>
  <!-- Cloud -->
  <ellipse cx="400" cy="140" rx="150" ry="70" fill="none" stroke="#f97316" stroke-width="2.5" opacity="0.5"/>
  <ellipse cx="330" cy="130" rx="80" ry="55" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="470" cy="130" rx="80" ry="55" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.3"/>
  <!-- Server icons inside cloud -->
  <rect x="360" y="115" width="30" height="40" rx="5" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <rect x="400" y="115" width="30" height="40" rx="5" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <circle cx="375" cy="128" r="3" fill="#22c55e" opacity="0.5"/>
  <circle cx="415" cy="128" r="3" fill="#22c55e" opacity="0.5"/>
  <!-- Rocket -->
  <g transform="translate(550,100)">
    <path d="M0 60 L15 0 L30 60 Z" fill="none" stroke="#f97316" stroke-width="2"/>
    <rect x="8" y="35" width="14" height="15" rx="3" fill="#f97316" opacity="0.3"/>
    <path d="M0 60 L-8 75 L8 65 Z" fill="#f97316" opacity="0.3"/>
    <path d="M30 60 L38 75 L22 65 Z" fill="#f97316" opacity="0.3"/>
    <!-- Flame -->
    <path d="M10 65 Q15 90 20 65" fill="#f59e0b" opacity="0.4"/>
  </g>
  <!-- Platform labels -->
  <g font-family="Arial" font-size="10" fill="#f97316" opacity="0.4">
    <text x="580" y="260">Vercel</text>
    <text x="580" y="280">Netlify</text>
    <text x="580" y="300">Railway</text>
  </g>
  <!-- GitHub icon -->
  <circle cx="160" cy="380" r="25" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.3"/>
  <text x="160" y="386" font-family="Arial" font-size="10" fill="#f97316" text-anchor="middle" opacity="0.4">git</text>
  <path d="M185 380 L240 380" stroke="#f97316" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
</svg>
