<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Three AI windows -->
  <g transform="translate(60,60)">
    <rect width="200" height="280" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" opacity="0.8"/>
    <rect width="200" height="25" rx="8" fill="#334155"/>
    <circle cx="15" cy="12" r="4" fill="#ef4444" opacity="0.5"/>
    <rect x="20" y="45" width="160" height="5" rx="2" fill="#ef4444" opacity="0.3"/>
    <rect x="20" y="60" width="140" height="5" rx="2" fill="#ef4444" opacity="0.3"/>
    <rect x="20" y="75" width="150" height="5" rx="2" fill="#ef4444" opacity="0.3"/>
    <rect x="20" y="95" width="160" height="5" rx="2" fill="#94a3b8" opacity="0.2"/>
    <rect x="20" y="110" width="130" height="5" rx="2" fill="#94a3b8" opacity="0.2"/>
    <text x="100" y="250" font-family="Arial" font-size="14" fill="#ef4444" text-anchor="middle" opacity="0.6">Session 1</text>
  </g>
  <g transform="translate(300,60)">
    <rect width="200" height="280" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" opacity="0.8"/>
    <rect width="200" height="25" rx="8" fill="#334155"/>
    <circle cx="15" cy="12" r="4" fill="#ef4444" opacity="0.5"/>
    <rect x="20" y="45" width="160" height="5" rx="2" fill="#ef4444" opacity="0.3"/>
    <rect x="20" y="60" width="140" height="5" rx="2" fill="#ef4444" opacity="0.3"/>
    <rect x="20" y="75" width="150" height="5" rx="2" fill="#ef4444" opacity="0.3"/>
    <rect x="20" y="95" width="160" height="5" rx="2" fill="#94a3b8" opacity="0.2"/>
    <rect x="20" y="110" width="130" height="5" rx="2" fill="#94a3b8" opacity="0.2"/>
    <text x="100" y="250" font-family="Arial" font-size="14" fill="#ef4444" text-anchor="middle" opacity="0.6">Session 2</text>
  </g>
  <g transform="translate(540,60)">
    <rect width="200" height="280" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" opacity="0.8"/>
    <rect width="200" height="25" rx="8" fill="#334155"/>
    <circle cx="15" cy="12" r="4" fill="#ef4444" opacity="0.5"/>
    <rect x="20" y="45" width="160" height="5" rx="2" fill="#ef4444" opacity="0.3"/>
    <rect x="20" y="60" width="140" height="5" rx="2" fill="#ef4444" opacity="0.3"/>
    <rect x="20" y="75" width="150" height="5" rx="2" fill="#ef4444" opacity="0.3"/>
    <rect x="20" y="95" width="160" height="5" rx="2" fill="#94a3b8" opacity="0.2"/>
    <rect x="20" y="110" width="130" height="5" rx="2" fill="#94a3b8" opacity="0.2"/>
    <text x="100" y="250" font-family="Arial" font-size="14" fill="#ef4444" text-anchor="middle" opacity="0.6">Session 3</text>
  </g>
  <!-- Equals signs between windows -->
  <text x="278" y="220" font-family="Arial" font-size="28" fill="#94a3b8" text-anchor="middle">=</text>
  <text x="518" y="220" font-family="Arial" font-size="28" fill="#94a3b8" text-anchor="middle">=</text>
  <!-- Same model label -->
  <rect x="200" y="390" width="400" height="60" rx="10" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="415" font-family="Arial" font-size="13" fill="#ef4444" text-anchor="middle" opacity="0.7">Same model = Same biases</text>
  <text x="400" y="435" font-family="Arial" font-size="11" fill="#94a3b8" text-anchor="middle" opacity="0.5">Consistency ≠ Correctness</text>
</svg>
