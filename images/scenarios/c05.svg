<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Legal document -->
  <rect x="100" y="60" width="250" height="340" rx="5" fill="#334155" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Scale of justice icon -->
  <line x1="225" y1="90" x2="225" y2="140" stroke="#ef4444" stroke-width="2"/>
  <line x1="185" y1="110" x2="265" y2="110" stroke="#ef4444" stroke-width="2"/>
  <path d="M185 110 L175 140 L195 140 Z" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
  <path d="M265 110 L255 140 L275 140 Z" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
  <!-- Document lines -->
  <g fill="#94a3b8" opacity="0.3">
    <rect x="120" y="160" width="200" height="4" rx="2"/><rect x="120" y="176" width="180" height="4" rx="2"/>
    <rect x="120" y="192" width="210" height="4" rx="2"/><rect x="120" y="208" width="170" height="4" rx="2"/>
    <rect x="120" y="224" width="200" height="4" rx="2"/><rect x="120" y="240" width="190" height="4" rx="2"/>
    <rect x="120" y="256" width="160" height="4" rx="2"/><rect x="120" y="272" width="210" height="4" rx="2"/>
  </g>
  <!-- Arrow to AI -->
  <path d="M360 230 L430 230" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.4"/>
  <polygon points="430,224 448,230 430,236" fill="#ef4444" opacity="0.4"/>
  <!-- AI Analysis box -->
  <rect x="460" y="80" width="260" height="200" rx="12" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
  <text x="590" y="110" font-family="Arial" font-size="13" fill="#ef4444" text-anchor="middle" opacity="0.7">AI Legal Analysis</text>
  <rect x="480" y="125" width="220" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="480" y="140" width="180" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="480" y="155" width="200" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="480" y="170" width="160" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="480" y="185" width="210" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <text x="590" y="230" font-family="Arial" font-size="11" fill="#22c55e" text-anchor="middle" opacity="0.5">Largely accurate ✓</text>
  <!-- Second AI reviewing -->
  <rect x="460" y="310" width="260" height="100" rx="12" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <text x="590" y="340" font-family="Arial" font-size="13" fill="#ef4444" text-anchor="middle" opacity="0.5">AI Review of AI</text>
  <rect x="480" y="355" width="200" height="5" rx="2" fill="#94a3b8" opacity="0.2"/>
  <rect x="480" y="370" width="180" height="5" rx="2" fill="#94a3b8" opacity="0.2"/>
  <!-- Circular arrow showing loop -->
  <path d="M730 180 Q750 250 720 310" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 3"/>
  <polygon points="716,305 720,320 728,308" fill="#ef4444" opacity="0.3"/>
  <!-- Warning -->
  <polygon points="225,330 210,360 240,360" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="225" y="355" font-family="Arial" font-size="14" fill="#f59e0b" text-anchor="middle">!</text>
</svg>
