<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- User message -->
  <rect x="60" y="60" width="200" height="50" rx="10" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="80" y="78" width="120" height="6" rx="3" fill="#f59e0b" opacity="0.4"/>
  <text x="160" y="100" font-family="Arial" font-size="9" fill="#94a3b8" text-anchor="middle" opacity="0.5">New message</text>
  <!-- Arrow to DB -->
  <path d="M270 85 L340 150" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <!-- Database (vector store) -->
  <ellipse cx="400" cy="160" rx="80" ry="25" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <path d="M320 160 L320 260 Q320 285 400 285 Q480 285 480 260 L480 160" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <ellipse cx="400" cy="195" rx="80" ry="20" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <ellipse cx="400" cy="230" rx="80" ry="20" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <text x="400" y="270" font-family="Arial" font-size="11" fill="#f59e0b" text-anchor="middle" opacity="0.5">Vector DB</text>
  <!-- Past conversations stored -->
  <g font-family="monospace" font-size="8" fill="#f59e0b" opacity="0.3">
    <text x="360" y="180">msg_1: [0.2, 0.8...]</text>
    <text x="360" y="195">msg_2: [0.5, 0.3...]</text>
    <text x="360" y="210">msg_3: [0.1, 0.9...]</text>
  </g>
  <!-- Retrieve relevant -->
  <path d="M400 290 L400 330" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <polygon points="394,330 400,345 406,330" fill="#f59e0b" opacity="0.4"/>
  <!-- Context window -->
  <rect x="280" y="350" width="240" height="100" rx="12" fill="#334155" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="375" font-family="Arial" font-size="11" fill="#f59e0b" text-anchor="middle" opacity="0.6">Context Window</text>
  <rect x="300" y="385" width="100" height="4" rx="2" fill="#f59e0b" opacity="0.3"/>
  <text x="300" y="383" font-family="Arial" font-size="8" fill="#94a3b8" opacity="0.4">Past context</text>
  <rect x="300" y="400" width="80" height="4" rx="2" fill="#f59e0b" opacity="0.4"/>
  <text x="300" y="398" font-family="Arial" font-size="8" fill="#94a3b8" opacity="0.4">+ New msg</text>
  <rect x="300" y="415" width="120" height="4" rx="2" fill="#f59e0b" opacity="0.2"/>
  <text x="300" y="413" font-family="Arial" font-size="8" fill="#94a3b8" opacity="0.3">→ Response</text>
  <!-- Arrow from new message -->
  <path d="M160 110 L160 380 L270 400" stroke="#f59e0b" stroke-width="1.5" opacity="0.3" stroke-dasharray="5 3"/>
  <!-- LLM on right -->
  <rect x="580" y="200" width="160" height="100" rx="15" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <text x="660" y="255" font-family="Arial" font-size="16" fill="#fbbf24" text-anchor="middle" opacity="0.5">LLM</text>
  <path d="M530 400 L580 300" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <path d="M660 310 L660 370" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <polygon points="654,370 660,385 666,370" fill="#f59e0b" opacity="0.4"/>
  <!-- Output -->
  <rect x="620" y="390" width="120" height="50" rx="8" fill="#334155" stroke="#22c55e" stroke-width="1.5"/>
  <text x="680" y="420" font-family="Arial" font-size="11" fill="#22c55e" text-anchor="middle" opacity="0.5">Response</text>
</svg>
