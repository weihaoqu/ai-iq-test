<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Giant code block flooding in -->
  <g opacity="0.6">
    <rect x="60" y="20" width="300" height="460" rx="8" fill="#0f172a" stroke="#ec4899" stroke-width="1.5"/>
    <g fill="#ec4899" opacity="0.3">
      <rect x="80" y="40" width="180" height="4" rx="2"/><rect x="80" y="52" width="140" height="4" rx="2"/>
      <rect x="80" y="64" width="200" height="4" rx="2"/><rect x="80" y="76" width="160" height="4" rx="2"/>
      <rect x="80" y="88" width="220" height="4" rx="2"/><rect x="80" y="100" width="180" height="4" rx="2"/>
      <rect x="80" y="112" width="130" height="4" rx="2"/><rect x="80" y="124" width="200" height="4" rx="2"/>
      <rect x="80" y="136" width="170" height="4" rx="2"/><rect x="80" y="148" width="190" height="4" rx="2"/>
      <rect x="80" y="160" width="150" height="4" rx="2"/><rect x="80" y="172" width="210" height="4" rx="2"/>
      <rect x="80" y="184" width="180" height="4" rx="2"/><rect x="80" y="196" width="140" height="4" rx="2"/>
      <rect x="80" y="208" width="200" height="4" rx="2"/><rect x="80" y="220" width="160" height="4" rx="2"/>
      <rect x="80" y="232" width="190" height="4" rx="2"/><rect x="80" y="244" width="170" height="4" rx="2"/>
      <rect x="80" y="256" width="210" height="4" rx="2"/><rect x="80" y="268" width="150" height="4" rx="2"/>
    </g>
    <!-- 2000 lines label -->
    <text x="210" y="460" font-family="monospace" font-size="12" fill="#ec4899" text-anchor="middle" opacity="0.5">2,000 lines</text>
  </g>
  <!-- Flood arrows -->
  <path d="M380 200 L450 200 M380 250 L450 250 M380 300 L450 300" stroke="#ec4899" stroke-width="2" opacity="0.4"/>
  <polygon points="450,194 470,200 450,206" fill="#ec4899" opacity="0.4"/>
  <polygon points="450,244 470,250 450,256" fill="#ec4899" opacity="0.4"/>
  <polygon points="450,294 470,300 450,306" fill="#ec4899" opacity="0.4"/>
  <!-- AI chat box overwhelmed -->
  <rect x="490" y="130" width="240" height="240" rx="12" fill="#334155" stroke="#ec4899" stroke-width="2" opacity="0.7"/>
  <!-- Explosion/overload effect -->
  <circle cx="610" cy="250" r="60" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.2"/>
  <circle cx="610" cy="250" r="80" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.1"/>
  <!-- Warning -->
  <polygon points="610,200 585,250 635,250" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="610" y="243" font-family="Arial" font-size="22" font-weight="bold" fill="#f59e0b" text-anchor="middle">!</text>
  <text x="610" y="300" font-family="Arial" font-size="12" fill="#ec4899" text-anchor="middle" opacity="0.6">Token limit exceeded</text>
</svg>
