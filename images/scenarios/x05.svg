<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Laptop (working fine) -->
  <rect x="80" y="120" width="250" height="160" rx="10" fill="#334155" stroke="#22c55e" stroke-width="2"/>
  <rect x="90" y="130" width="230" height="130" rx="5" fill="#0f172a"/>
  <!-- Happy screen content -->
  <rect x="110" y="150" width="100" height="6" rx="2" fill="#22c55e" opacity="0.4"/>
  <rect x="110" y="165" width="160" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="110" y="178" width="140" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="110" y="195" width="80" height="20" rx="4" fill="#22c55e" opacity="0.2"/>
  <text x="150" y="210" font-family="Arial" font-size="10" fill="#22c55e" text-anchor="middle" opacity="0.5">Works!</text>
  <rect x="55" y="280" width="300" height="12" rx="4" fill="#475569"/>
  <text x="205" y="320" font-family="Arial" font-size="12" fill="#22c55e" text-anchor="middle" opacity="0.6">localhost</text>
  <!-- Clean test data -->
  <rect x="100" y="340" width="210" height="50" rx="5" fill="#334155" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  <text x="205" y="365" font-family="Arial" font-size="10" fill="#22c55e" text-anchor="middle" opacity="0.5">Clean test data</text>
  <text x="205" y="380" font-family="Arial" font-size="9" fill="#94a3b8" text-anchor="middle" opacity="0.3">name: "John", age: 25</text>
  <!-- VS -->
  <text x="400" y="250" font-family="Arial" font-size="22" fill="#94a3b8" text-anchor="middle" opacity="0.3">VS</text>
  <!-- Server (crashing) -->
  <rect x="480" y="100" width="240" height="200" rx="10" fill="#334155" stroke="#ef4444" stroke-width="2"/>
  <!-- Server rack look -->
  <rect x="500" y="120" width="200" height="30" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <circle cx="520" cy="135" r="4" fill="#ef4444"/><circle cx="535" cy="135" r="4" fill="#ef4444" opacity="0.5"/>
  <rect x="500" y="160" width="200" height="30" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <circle cx="520" cy="175" r="4" fill="#ef4444"/><circle cx="535" cy="175" r="4" fill="#ef4444" opacity="0.5"/>
  <rect x="500" y="200" width="200" height="30" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <circle cx="520" cy="215" r="4" fill="#ef4444"/><circle cx="535" cy="215" r="4" fill="#ef4444" opacity="0.5"/>
  <!-- Crash icon -->
  <text x="660" y="180" font-family="Arial" font-size="30" fill="#ef4444" opacity="0.5">✕</text>
  <text x="600" y="330" font-family="Arial" font-size="12" fill="#ef4444" text-anchor="middle" opacity="0.6">Production</text>
  <!-- Messy real data -->
  <rect x="480" y="340" width="240" height="80" rx="5" fill="#334155" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <text x="600" y="365" font-family="Arial" font-size="10" fill="#ef4444" text-anchor="middle" opacity="0.5">Real-world data</text>
  <text x="600" y="380" font-family="Arial" font-size="9" fill="#94a3b8" text-anchor="middle" opacity="0.3">name: null, age: "N/A"</text>
  <text x="600" y="395" font-family="Arial" font-size="9" fill="#94a3b8" text-anchor="middle" opacity="0.3">email: "not@a@valid"</text>
  <!-- Error log -->
  <rect x="480" y="430" width="240" height="30" rx="5" fill="#ef4444" opacity="0.1"/>
  <text x="600" y="450" font-family="monospace" font-size="10" fill="#ef4444" text-anchor="middle" opacity="0.5">TypeError: Cannot read null</text>
</svg>
