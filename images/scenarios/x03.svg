<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Example 1 -->
  <rect x="60" y="60" width="260" height="80" rx="8" fill="#334155" stroke="#10b981" stroke-width="1.5"/>
  <text x="80" y="85" font-family="Arial" font-size="10" fill="#10b981" opacity="0.7">Example 1:</text>
  <rect x="80" y="95" width="120" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <text x="210" y="95" font-family="Arial" font-size="10" fill="#10b981" opacity="0.5">→</text>
  <rect x="225" y="90" width="80" height="15" rx="3" fill="#10b981" opacity="0.2"/>
  <rect x="80" y="110" width="100" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <text x="210" y="115" font-family="Arial" font-size="10" fill="#10b981" opacity="0.5">→</text>
  <rect x="225" y="108" width="60" height="15" rx="3" fill="#10b981" opacity="0.2"/>
  <!-- Example 2 -->
  <rect x="60" y="160" width="260" height="80" rx="8" fill="#334155" stroke="#10b981" stroke-width="1.5" opacity="0.8"/>
  <text x="80" y="185" font-family="Arial" font-size="10" fill="#10b981" opacity="0.6">Example 2:</text>
  <rect x="80" y="195" width="130" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <text x="220" y="200" font-family="Arial" font-size="10" fill="#10b981" opacity="0.4">→</text>
  <rect x="235" y="193" width="70" height="15" rx="3" fill="#10b981" opacity="0.15"/>
  <!-- Example 3 -->
  <rect x="60" y="260" width="260" height="80" rx="8" fill="#334155" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
  <text x="80" y="285" font-family="Arial" font-size="10" fill="#10b981" opacity="0.5">Example 3:</text>
  <rect x="80" y="295" width="110" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <text x="200" y="300" font-family="Arial" font-size="10" fill="#10b981" opacity="0.3">→</text>
  <rect x="215" y="293" width="80" height="15" rx="3" fill="#10b981" opacity="0.1"/>
  <!-- Arrow to prompt -->
  <g stroke="#10b981" stroke-width="1.5" opacity="0.4">
    <line x1="330" y1="100" x2="430" y2="220"/>
    <line x1="330" y1="200" x2="430" y2="230"/>
    <line x1="330" y1="300" x2="430" y2="250"/>
  </g>
  <!-- Prompt/Model box -->
  <rect x="440" y="160" width="200" height="140" rx="15" fill="none" stroke="#10b981" stroke-width="2.5"/>
  <text x="540" y="210" font-family="Arial" font-size="14" fill="#10b981" text-anchor="middle" opacity="0.6">Few-Shot</text>
  <text x="540" y="230" font-family="Arial" font-size="14" fill="#10b981" text-anchor="middle" opacity="0.6">Prompt</text>
  <text x="540" y="260" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle" opacity="0.4">Now do this one:</text>
  <rect x="490" y="268" width="100" height="15" rx="3" fill="#10b981" opacity="0.15"/>
  <!-- Output -->
  <path d="M650 230 L700 230" stroke="#10b981" stroke-width="2" opacity="0.4"/>
  <polygon points="700,224 718,230 700,236" fill="#10b981" opacity="0.4"/>
  <rect x="720" y="200" width="60" height="60" rx="8" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="750" y="235" font-family="Arial" font-size="10" fill="#10b981" text-anchor="middle" opacity="0.5">JSON</text>
  <!-- Label -->
  <text x="400" y="420" font-family="Arial" font-size="12" fill="#10b981" text-anchor="middle" opacity="0.4">Pattern learning from examples</text>
</svg>
