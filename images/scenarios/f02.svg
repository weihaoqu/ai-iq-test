<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Left prompt box -->
  <rect x="80" y="60" width="280" height="60" rx="10" fill="#334155" stroke="#6366f1" stroke-width="2"/>
  <rect x="100" y="78" width="180" height="8" rx="4" fill="#6366f1" opacity="0.6"/>
  <rect x="100" y="94" width="140" height="8" rx="4" fill="#6366f1" opacity="0.4"/>
  <!-- Left output -->
  <rect x="80" y="140" width="280" height="180" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <rect x="100" y="160" width="240" height="6" rx="3" fill="#818cf8" opacity="0.5"/>
  <rect x="100" y="178" width="200" height="6" rx="3" fill="#818cf8" opacity="0.4"/>
  <rect x="100" y="196" width="220" height="6" rx="3" fill="#818cf8" opacity="0.5"/>
  <rect x="100" y="214" width="180" height="6" rx="3" fill="#818cf8" opacity="0.3"/>
  <rect x="100" y="232" width="240" height="6" rx="3" fill="#818cf8" opacity="0.4"/>
  <rect x="100" y="250" width="160" height="6" rx="3" fill="#818cf8" opacity="0.5"/>
  <text x="220" y="300" font-family="Arial" font-size="14" fill="#6366f1" text-anchor="middle">Output A</text>
  <!-- Right prompt box (identical) -->
  <rect x="440" y="60" width="280" height="60" rx="10" fill="#334155" stroke="#6366f1" stroke-width="2"/>
  <rect x="460" y="78" width="180" height="8" rx="4" fill="#6366f1" opacity="0.6"/>
  <rect x="460" y="94" width="140" height="8" rx="4" fill="#6366f1" opacity="0.4"/>
  <!-- Right output (different) -->
  <rect x="440" y="140" width="280" height="180" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <rect x="460" y="160" width="200" height="6" rx="3" fill="#a78bfa" opacity="0.5"/>
  <rect x="460" y="178" width="240" height="6" rx="3" fill="#a78bfa" opacity="0.4"/>
  <rect x="460" y="196" width="160" height="6" rx="3" fill="#a78bfa" opacity="0.5"/>
  <rect x="460" y="214" width="230" height="6" rx="3" fill="#a78bfa" opacity="0.3"/>
  <rect x="460" y="232" width="190" height="6" rx="3" fill="#a78bfa" opacity="0.4"/>
  <rect x="460" y="250" width="210" height="6" rx="3" fill="#a78bfa" opacity="0.5"/>
  <text x="580" y="300" font-family="Arial" font-size="14" fill="#a78bfa" text-anchor="middle">Output B</text>
  <!-- Equals sign between prompts -->
  <text x="400" y="100" font-family="Arial" font-size="28" fill="#94a3b8" text-anchor="middle">=</text>
  <!-- Not equals between outputs -->
  <text x="400" y="230" font-family="Arial" font-size="36" fill="#ef4444" text-anchor="middle">≠</text>
  <!-- Dice icon at bottom -->
  <rect x="365" y="380" width="70" height="70" rx="12" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <circle cx="385" cy="400" r="5" fill="#6366f1" opacity="0.7"/><circle cx="415" cy="400" r="5" fill="#6366f1" opacity="0.7"/>
  <circle cx="400" cy="415" r="5" fill="#6366f1" opacity="0.7"/>
  <circle cx="385" cy="430" r="5" fill="#6366f1" opacity="0.7"/><circle cx="415" cy="430" r="5" fill="#6366f1" opacity="0.7"/>
</svg>
