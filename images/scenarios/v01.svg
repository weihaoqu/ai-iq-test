<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Wireframe sketch -->
  <rect x="150" y="40" width="500" height="400" rx="8" fill="#0f172a" stroke="#f97316" stroke-width="2"/>
  <!-- Header wireframe -->
  <rect x="170" y="60" width="460" height="40" rx="5" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <rect x="185" y="72" width="80" height="10" rx="3" fill="#f97316" opacity="0.3"/>
  <rect x="500" y="72" width="40" height="10" rx="3" fill="#f97316" opacity="0.2"/>
  <rect x="550" y="72" width="40" height="10" rx="3" fill="#f97316" opacity="0.2"/>
  <!-- Hero section -->
  <rect x="170" y="115" width="460" height="120" rx="5" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>
  <rect x="200" y="145" width="200" height="12" rx="4" fill="#f97316" opacity="0.4"/>
  <rect x="200" y="170" width="160" height="8" rx="3" fill="#f97316" opacity="0.2"/>
  <rect x="200" y="190" width="80" height="25" rx="5" fill="#f97316" opacity="0.3"/>
  <!-- Image placeholder -->
  <rect x="450" y="130" width="150" height="90" rx="5" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
  <line x1="450" y1="130" x2="600" y2="220" stroke="#f97316" stroke-width="0.5" opacity="0.2"/>
  <line x1="600" y1="130" x2="450" y2="220" stroke="#f97316" stroke-width="0.5" opacity="0.2"/>
  <!-- Content cards -->
  <rect x="170" y="250" width="145" height="100" rx="5" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
  <rect x="327" y="250" width="145" height="100" rx="5" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
  <rect x="485" y="250" width="145" height="100" rx="5" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
  <!-- Footer -->
  <rect x="170" y="370" width="460" height="50" rx="5" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="3 3" opacity="0.2"/>
  <!-- Pencil/planning icon -->
  <line x1="700" y1="120" x2="730" y2="90" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="730" y1="90" x2="735" y2="95" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Annotations -->
  <text x="720" y="180" font-family="Arial" font-size="10" fill="#f97316" opacity="0.4">About</text>
  <text x="720" y="260" font-family="Arial" font-size="10" fill="#f97316" opacity="0.4">Projects</text>
  <text x="720" y="370" font-family="Arial" font-size="10" fill="#f97316" opacity="0.4">Contact</text>
</svg>
