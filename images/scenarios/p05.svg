<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Paper 1 -->
  <rect x="120" y="80" width="180" height="240" rx="5" fill="#334155" stroke="#ec4899" stroke-width="1.5" opacity="0.8"/>
  <rect x="140" y="100" width="100" height="6" rx="2" fill="#ec4899" opacity="0.5"/>
  <rect x="140" y="114" width="140" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="140" y="126" width="120" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="140" y="138" width="140" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <text x="210" y="180" font-family="Arial" font-size="11" fill="#22c55e" text-anchor="middle" opacity="0.6">Real</text>
  <!-- Paper 2 -->
  <rect x="320" y="80" width="180" height="240" rx="5" fill="#334155" stroke="#ec4899" stroke-width="1.5" opacity="0.8"/>
  <rect x="340" y="100" width="100" height="6" rx="2" fill="#ec4899" opacity="0.5"/>
  <rect x="340" y="114" width="140" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="340" y="126" width="120" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="340" y="138" width="140" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <text x="410" y="180" font-family="Arial" font-size="11" fill="#22c55e" text-anchor="middle" opacity="0.6">Real</text>
  <!-- Paper 3 (fake) -->
  <rect x="520" y="80" width="180" height="240" rx="5" fill="#334155" stroke="#ef4444" stroke-width="1.5" opacity="0.8"/>
  <rect x="540" y="100" width="100" height="6" rx="2" fill="#ec4899" opacity="0.5"/>
  <rect x="540" y="114" width="140" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="540" y="126" width="120" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="540" y="138" width="140" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <text x="610" y="180" font-family="Arial" font-size="11" fill="#ef4444" text-anchor="middle" opacity="0.8">Fabricated?</text>
  <!-- Magnifying glass over paper 3 -->
  <circle cx="600" cy="240" r="55" fill="none" stroke="#ec4899" stroke-width="3" opacity="0.7"/>
  <line x1="640" y1="280" x2="680" y2="320" stroke="#ec4899" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- Question mark in magnifier -->
  <text x="600" y="250" font-family="Arial" font-size="36" fill="#ec4899" text-anchor="middle" opacity="0.6">?</text>
  <!-- Citation lines at bottom -->
  <rect x="160" y="380" width="480" height="80" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="180" y="395" width="300" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="180" y="408" width="280" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="180" y="421" width="320" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="180" y="434" width="260" height="5" rx="2" fill="#ef4444" opacity="0.3"/>
</svg>
