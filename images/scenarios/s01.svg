<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Team account (left, safe) -->
  <rect x="80" y="80" width="260" height="300" rx="15" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <rect x="100" y="100" width="100" height="25" rx="5" fill="#22c55e" opacity="0.2"/>
  <text x="150" y="118" font-family="Arial" font-size="12" fill="#22c55e" text-anchor="middle">Team Plan</text>
  <rect x="100" y="145" width="220" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="100" y="160" width="180" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="100" y="175" width="200" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <!-- Shield icon -->
  <path d="M210 240 L190 260 L210 300 L230 260 Z" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
  <polyline points="203,265 210,273 222,258" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
  <text x="210" y="340" font-family="Arial" font-size="11" fill="#22c55e" text-anchor="middle" opacity="0.6">Data protected</text>
  <!-- Arrow between -->
  <path d="M355 230 L445 230" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="8 4" opacity="0.4"/>
  <polygon points="445,224 462,230 445,236" fill="#8b5cf6" opacity="0.4"/>
  <!-- Free account (right, risky) -->
  <rect x="460" y="80" width="260" height="300" rx="15" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
  <rect x="480" y="100" width="100" height="25" rx="5" fill="#ef4444" opacity="0.2"/>
  <text x="530" y="118" font-family="Arial" font-size="12" fill="#ef4444" text-anchor="middle">Free Tier</text>
  <rect x="480" y="145" width="220" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="480" y="160" width="180" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="480" y="175" width="200" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
  <!-- Leaking data -->
  <g stroke="#ef4444" stroke-width="1" opacity="0.3" stroke-dasharray="3 3">
    <line x1="600" y1="200" x2="700" y2="180"/>
    <line x1="610" y1="230" x2="720" y2="240"/>
    <line x1="600" y1="260" x2="710" y2="290"/>
  </g>
  <text x="590" y="340" font-family="Arial" font-size="11" fill="#ef4444" text-anchor="middle" opacity="0.6">May train on data</text>
  <!-- Person switching -->
  <circle cx="400" cy="420" r="25" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="400" y1="445" x2="400" y2="480" stroke="#8b5cf6" stroke-width="2"/>
</svg>
