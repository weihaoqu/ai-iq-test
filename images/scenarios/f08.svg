<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Divider line -->
  <line x1="400" y1="60" x2="400" y2="440" stroke="#6366f1" stroke-width="0.5" opacity="0.15" stroke-dasharray="6,6"/>

  <!-- === LEFT SIDE: TRAINING === -->

  <!-- Training data cluster — scattered data dots -->
  <circle cx="100" cy="150" r="6" fill="#6366f1" opacity="0.25"/>
  <circle cx="130" cy="180" r="5" fill="#6366f1" opacity="0.2"/>
  <circle cx="85" cy="200" r="7" fill="#6366f1" opacity="0.3"/>
  <circle cx="140" cy="140" r="4" fill="#818cf8" opacity="0.2"/>
  <circle cx="70" cy="170" r="5" fill="#818cf8" opacity="0.25"/>
  <circle cx="120" cy="220" r="6" fill="#6366f1" opacity="0.2"/>
  <circle cx="90" cy="240" r="4" fill="#818cf8" opacity="0.15"/>
  <circle cx="150" cy="210" r="5" fill="#6366f1" opacity="0.2"/>
  <circle cx="110" cy="260" r="6" fill="#818cf8" opacity="0.25"/>
  <circle cx="75" cy="280" r="5" fill="#6366f1" opacity="0.2"/>
  <circle cx="135" cy="275" r="4" fill="#818cf8" opacity="0.15"/>
  <circle cx="95" cy="300" r="7" fill="#6366f1" opacity="0.25"/>
  <circle cx="60" cy="250" r="3" fill="#818cf8" opacity="0.15"/>
  <circle cx="155" cy="165" r="3" fill="#6366f1" opacity="0.15"/>
  <circle cx="68" cy="310" r="4" fill="#818cf8" opacity="0.2"/>
  <circle cx="145" cy="300" r="5" fill="#6366f1" opacity="0.2"/>
  <circle cx="110" cy="330" r="4" fill="#818cf8" opacity="0.15"/>
  <circle cx="80" cy="340" r="6" fill="#6366f1" opacity="0.25"/>

  <!-- Data flow arrows from cluster to model -->
  <path d="M160,200 Q200,200 230,220" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <path d="M160,250 Q200,250 230,250" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <path d="M160,300 Q200,290 230,280" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <!-- Converging arrows -->
  <line x1="170" y1="180" x2="235" y2="230" stroke="#818cf8" stroke-width="0.8" opacity="0.2"/>
  <line x1="170" y1="250" x2="235" y2="250" stroke="#818cf8" stroke-width="0.8" opacity="0.2"/>
  <line x1="170" y1="320" x2="235" y2="270" stroke="#818cf8" stroke-width="0.8" opacity="0.2"/>

  <!-- Central Model box -->
  <rect x="240" y="200" width="110" height="100" rx="8" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.7"/>
  <rect x="240" y="200" width="110" height="100" rx="8" fill="#6366f1" opacity="0.06"/>

  <!-- Neural network layers inside model -->
  <!-- Layer 1 -->
  <circle cx="270" cy="230" r="5" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <circle cx="270" cy="250" r="5" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <circle cx="270" cy="270" r="5" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <!-- Layer 2 -->
  <circle cx="295" cy="235" r="5" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <circle cx="295" cy="255" r="5" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <circle cx="295" cy="275" r="5" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <!-- Layer 3 -->
  <circle cx="320" cy="240" r="5" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <circle cx="320" cy="260" r="5" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.5"/>

  <!-- Connections between layers -->
  <line x1="275" y1="230" x2="290" y2="235" stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="275" y1="230" x2="290" y2="255" stroke="#818cf8" stroke-width="0.5" opacity="0.2"/>
  <line x1="275" y1="250" x2="290" y2="235" stroke="#818cf8" stroke-width="0.5" opacity="0.2"/>
  <line x1="275" y1="250" x2="290" y2="255" stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="275" y1="250" x2="290" y2="275" stroke="#818cf8" stroke-width="0.5" opacity="0.2"/>
  <line x1="275" y1="270" x2="290" y2="255" stroke="#818cf8" stroke-width="0.5" opacity="0.2"/>
  <line x1="275" y1="270" x2="290" y2="275" stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="235" x2="315" y2="240" stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="255" x2="315" y2="240" stroke="#818cf8" stroke-width="0.5" opacity="0.2"/>
  <line x1="300" y1="255" x2="315" y2="260" stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="275" x2="315" y2="260" stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>

  <!-- Training loop arrow (curved back) -->
  <path d="M295,305 Q295,350 240,350 Q185,350 185,310 Q185,270 200,250" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.25" stroke-dasharray="4,3"/>
  <polygon points="200,248 196,258 204,256" fill="#818cf8" opacity="0.35"/>

  <!-- === BIG ARROW from left to right === -->
  <line x1="355" y1="250" x2="440" y2="250" stroke="url(#g1)" stroke-width="2" opacity="0.5"/>
  <polygon points="445,250 432,242 432,258" fill="#818cf8" opacity="0.6"/>

  <!-- === RIGHT SIDE: INFERENCE === -->

  <!-- Smaller model copy -->
  <rect x="460" y="215" width="80" height="70" rx="6" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.6"/>
  <rect x="460" y="215" width="80" height="70" rx="6" fill="#6366f1" opacity="0.05"/>
  <!-- Simplified layers -->
  <circle cx="485" cy="245" r="4" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <circle cx="485" cy="260" r="4" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <circle cx="510" cy="250" r="4" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <circle cx="525" cy="250" r="4" fill="#6366f1" opacity="0.35"/>
  <line x1="489" y1="245" x2="506" y2="250" stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="489" y1="260" x2="506" y2="250" stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>
  <line x1="514" y1="250" x2="521" y2="250" stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>

  <!-- Single input arrow -->
  <circle cx="470" cy="170" r="8" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <circle cx="470" cy="170" r="3" fill="#818cf8" opacity="0.3"/>
  <line x1="475" y1="180" x2="490" y2="212" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <polygon points="490,215 485,207 493,208" fill="#818cf8" opacity="0.4"/>

  <!-- Output arrow and result -->
  <line x1="545" y1="250" x2="620" y2="250" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
  <polygon points="625,250 615,244 615,256" fill="#818cf8" opacity="0.6"/>

  <!-- Output result shapes -->
  <rect x="640" y="230" width="100" height="40" rx="6" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <line x1="655" y1="245" x2="690" y2="245" stroke="#818cf8" stroke-width="1.5" opacity="0.35"/>
  <line x1="655" y1="255" x2="720" y2="255" stroke="#818cf8" stroke-width="1" opacity="0.25"/>

  <!-- Speed indicator dots on right side -->
  <circle cx="580" cy="200" r="2" fill="#818cf8" opacity="0.2"/>
  <circle cx="590" cy="195" r="2" fill="#818cf8" opacity="0.15"/>
  <circle cx="600" cy="190" r="2" fill="#818cf8" opacity="0.1"/>

  <!-- Decorative corner elements -->
  <path d="M30,30 L70,30 M30,30 L30,70" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M770,30 L730,30 M770,30 L770,70" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M30,470 L70,470 M30,470 L30,430" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M770,470 L730,470 M770,470 L770,430" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
</svg>
