<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Central divider -->
  <line x1="400" y1="80" x2="400" y2="420" stroke="#6366f1" stroke-width="0.5" opacity="0.12" stroke-dasharray="8,6"/>

  <!-- === LEFT SIDE: OPEN MODEL === -->

  <!-- Open lock shape -->
  <!-- Lock body -->
  <rect x="195" y="240" width="70" height="55" rx="6" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.65"/>
  <rect x="195" y="240" width="70" height="55" rx="6" fill="#6366f1" opacity="0.06"/>
  <!-- Lock shackle (open) -->
  <path d="M220,240 L220,210 Q220,185 245,185" fill="none" stroke="#818cf8" stroke-width="2.5" opacity="0.6"/>
  <!-- Shackle end floating (open) -->
  <line x1="245" y1="185" x2="245" y2="200" stroke="#818cf8" stroke-width="2.5" opacity="0.4"/>
  <!-- Keyhole -->
  <circle cx="230" cy="262" r="8" fill="none" stroke="#818cf8" stroke-width="1.2" opacity="0.4"/>
  <rect x="228" y="268" width="4" height="12" rx="1" fill="#818cf8" opacity="0.3"/>

  <!-- Radiating openness lines -->
  <line x1="175" y1="200" x2="155" y2="180" stroke="#818cf8" stroke-width="0.8" opacity="0.2"/>
  <line x1="170" y1="260" x2="145" y2="260" stroke="#818cf8" stroke-width="0.8" opacity="0.2"/>
  <line x1="175" y1="310" x2="155" y2="330" stroke="#818cf8" stroke-width="0.8" opacity="0.2"/>
  <line x1="285" y1="200" x2="305" y2="180" stroke="#818cf8" stroke-width="0.8" opacity="0.2"/>
  <line x1="290" y1="260" x2="310" y2="260" stroke="#818cf8" stroke-width="0.8" opacity="0.2"/>
  <line x1="285" y1="310" x2="305" y2="330" stroke="#818cf8" stroke-width="0.8" opacity="0.2"/>

  <!-- Open source indicators — branching paths -->
  <circle cx="140" cy="170" r="4" fill="#818cf8" opacity="0.3"/>
  <circle cx="130" cy="260" r="4" fill="#818cf8" opacity="0.3"/>
  <circle cx="140" cy="340" r="4" fill="#818cf8" opacity="0.3"/>
  <circle cx="320" cy="170" r="4" fill="#818cf8" opacity="0.3"/>
  <circle cx="325" cy="260" r="4" fill="#818cf8" opacity="0.3"/>
  <circle cx="320" cy="340" r="4" fill="#818cf8" opacity="0.3"/>

  <!-- Code bracket hints -->
  <path d="M120,225 L105,250 L120,275" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <path d="M340,225 L355,250 L340,275" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.2"/>

  <!-- Glow around open lock -->
  <circle cx="230" cy="255" r="55" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.08" filter="url(#glow1)"/>

  <!-- === CENTER: Decision arrow === -->
  <path d="M400,210 L420,250 L400,290 L380,250 Z" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="400" cy="250" r="8" fill="#6366f1" opacity="0.3"/>
  <!-- Bidirectional arrows -->
  <line x1="350" y1="250" x2="378" y2="250" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <polygon points="348,250 355,246 355,254" fill="#818cf8" opacity="0.35"/>
  <line x1="422" y1="250" x2="450" y2="250" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <polygon points="452,250 445,246 445,254" fill="#818cf8" opacity="0.35"/>

  <!-- === RIGHT SIDE: CLOSED MODEL === -->

  <!-- Closed lock / secure server -->
  <!-- Server rack shape -->
  <rect x="525" y="195" width="90" height="110" rx="6" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <rect x="525" y="195" width="90" height="110" rx="6" fill="#6366f1" opacity="0.05"/>
  <!-- Server rows -->
  <line x1="535" y1="225" x2="605" y2="225" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  <line x1="535" y1="260" x2="605" y2="260" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  <!-- Indicator lights -->
  <circle cx="545" cy="212" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="555" cy="212" r="3" fill="#818cf8" opacity="0.25"/>
  <circle cx="545" cy="242" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="555" cy="242" r="3" fill="#818cf8" opacity="0.25"/>
  <circle cx="545" cy="278" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="555" cy="278" r="3" fill="#818cf8" opacity="0.25"/>
  <!-- Ventilation lines -->
  <line x1="575" y1="208" x2="600" y2="208" stroke="#818cf8" stroke-width="0.8" opacity="0.15"/>
  <line x1="575" y1="213" x2="600" y2="213" stroke="#818cf8" stroke-width="0.8" opacity="0.15"/>
  <line x1="575" y1="238" x2="600" y2="238" stroke="#818cf8" stroke-width="0.8" opacity="0.15"/>
  <line x1="575" y1="243" x2="600" y2="243" stroke="#818cf8" stroke-width="0.8" opacity="0.15"/>

  <!-- Closed lock overlay -->
  <rect x="553" y="265" width="34" height="28" rx="4" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <path d="M560,265 L560,255 Q560,242 570,242 Q580,242 580,255 L580,265" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <circle cx="570" cy="278" r="3" fill="#818cf8" opacity="0.4"/>

  <!-- Shield outline around server -->
  <path d="M570,160 L630,185 L630,300 Q630,340 570,360 Q510,340 510,300 L510,185 Z" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.12"/>

  <!-- Blocked access lines (X marks) -->
  <g opacity="0.2">
    <line x1="640" y1="220" x2="670" y2="220" stroke="#818cf8" stroke-width="0.8"/>
    <line x1="672" y1="216" x2="680" y2="224" stroke="#818cf8" stroke-width="1"/>
    <line x1="680" y1="216" x2="672" y2="224" stroke="#818cf8" stroke-width="1"/>
    <line x1="640" y1="250" x2="670" y2="250" stroke="#818cf8" stroke-width="0.8"/>
    <line x1="672" y1="246" x2="680" y2="254" stroke="#818cf8" stroke-width="1"/>
    <line x1="680" y1="246" x2="672" y2="254" stroke="#818cf8" stroke-width="1"/>
  </g>

  <!-- Decorative corner elements -->
  <path d="M30,30 L70,30 M30,30 L30,70" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M770,30 L730,30 M770,30 L770,70" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M30,470 L70,470 M30,470 L30,430" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M770,470 L730,470 M770,470 L770,430" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
</svg>
