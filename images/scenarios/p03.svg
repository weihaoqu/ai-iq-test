<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Code window -->
  <rect x="100" y="80" width="340" height="340" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <rect x="100" y="80" width="340" height="30" rx="10" fill="#334155"/>
  <circle cx="120" cy="95" r="5" fill="#ef4444" opacity="0.7"/><circle cx="136" cy="95" r="5" fill="#f59e0b" opacity="0.7"/><circle cx="152" cy="95" r="5" fill="#22c55e" opacity="0.7"/>
  <!-- Code lines -->
  <rect x="120" y="125" width="80" height="6" rx="2" fill="#ec4899" opacity="0.6"/>
  <rect x="120" y="141" width="200" height="6" rx="2" fill="#94a3b8" opacity="0.4"/>
  <rect x="140" y="157" width="160" height="6" rx="2" fill="#22c55e" opacity="0.4"/>
  <rect x="140" y="173" width="180" height="6" rx="2" fill="#94a3b8" opacity="0.4"/>
  <rect x="120" y="189" width="120" height="6" rx="2" fill="#ec4899" opacity="0.6"/>
  <rect x="140" y="205" width="200" height="6" rx="2" fill="#94a3b8" opacity="0.4"/>
  <!-- Check mark (yesterday) -->
  <circle cx="390" y="250" r="25" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <polyline points="378,250 387,260 405,240" fill="none" stroke="#22c55e" stroke-width="3"/>
  <!-- X mark (today) -->
  <circle cx="390" y="340" r="25" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="378" y1="328" x2="402" y2="352" stroke="#ef4444" stroke-width="3"/>
  <line x1="402" y1="328" x2="378" y2="352" stroke="#ef4444" stroke-width="3"/>
  <!-- Calendar -->
  <rect x="520" y="120" width="180" height="180" rx="10" fill="#334155" stroke="#ec4899" stroke-width="2"/>
  <rect x="520" y="120" width="180" height="40" rx="10" fill="#ec4899" opacity="0.3"/>
  <text x="610" y="148" font-family="Arial" font-size="16" fill="#ec4899" text-anchor="middle">Yesterday</text>
  <!-- Calendar grid -->
  <g fill="#94a3b8" opacity="0.3">
    <rect x="540" y="175" width="20" height="20" rx="3"/><rect x="570" y="175" width="20" height="20" rx="3"/>
    <rect x="600" y="175" width="20" height="20" rx="3"/><rect x="630" y="175" width="20" height="20" rx="3"/>
    <rect x="660" y="175" width="20" height="20" rx="3"/>
    <rect x="540" y="205" width="20" height="20" rx="3"/><rect x="570" y="205" width="20" height="20" rx="3"/>
    <rect x="600" y="205" width="20" height="20" rx="3"/><rect x="630" y="205" width="20" height="20" rx="3"/>
    <rect x="660" y="205" width="20" height="20" rx="3"/>
  </g>
  <rect x="660" y="205" width="20" height="20" rx="3" fill="#ec4899" opacity="0.5"/>
  <!-- Clock -->
  <circle cx="610" cy="380" r="50" fill="none" stroke="#ec4899" stroke-width="2"/>
  <line x1="610" y1="380" x2="610" y2="345" stroke="#ec4899" stroke-width="2.5"/>
  <line x1="610" y1="380" x2="635" y2="390" stroke="#ec4899" stroke-width="2"/>
  <circle cx="610" cy="380" r="4" fill="#ec4899"/>
</svg>
