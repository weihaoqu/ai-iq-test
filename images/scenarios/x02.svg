<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Model A chart -->
  <rect x="60" y="60" width="320" height="320" rx="10" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="95" font-family="Arial" font-size="14" fill="#ef4444" text-anchor="middle" opacity="0.7">Model A</text>
  <text x="220" y="115" font-family="Arial" font-size="11" fill="#94a3b8" text-anchor="middle" opacity="0.5">10,000 diverse samples</text>
  <!-- Axis -->
  <line x1="100" y1="130" x2="100" y2="350" stroke="#334155" stroke-width="1.5"/>
  <line x1="100" y1="350" x2="350" y2="350" stroke="#334155" stroke-width="1.5"/>
  <!-- Bars (varied) -->
  <rect x="120" y="170" width="30" height="180" rx="3" fill="#ef4444" opacity="0.5"/>
  <rect x="165" y="190" width="30" height="160" rx="3" fill="#ef4444" opacity="0.45"/>
  <rect x="210" y="160" width="30" height="190" rx="3" fill="#ef4444" opacity="0.5"/>
  <rect x="255" y="200" width="30" height="150" rx="3" fill="#ef4444" opacity="0.4"/>
  <rect x="300" y="180" width="30" height="170" rx="3" fill="#ef4444" opacity="0.45"/>
  <!-- 95% line -->
  <line x1="90" y1="175" x2="340" y2="175" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.5"/>
  <text x="80" y="175" font-family="Arial" font-size="9" fill="#22c55e" opacity="0.5" text-anchor="end">95%</text>
  <!-- Model B chart -->
  <rect x="420" y="60" width="320" height="320" rx="10" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
  <text x="580" y="95" font-family="Arial" font-size="14" fill="#ef4444" text-anchor="middle" opacity="0.7">Model B</text>
  <text x="580" y="115" font-family="Arial" font-size="11" fill="#94a3b8" text-anchor="middle" opacity="0.5">500 single-source samples</text>
  <!-- Axis -->
  <line x1="460" y1="130" x2="460" y2="350" stroke="#334155" stroke-width="1.5"/>
  <line x1="460" y1="350" x2="710" y2="350" stroke="#334155" stroke-width="1.5"/>
  <!-- Bars (uniform/narrow) -->
  <rect x="500" y="170" width="30" height="180" rx="3" fill="#f59e0b" opacity="0.4"/>
  <rect x="550" y="168" width="30" height="182" rx="3" fill="#f59e0b" opacity="0.4"/>
  <rect x="600" y="172" width="30" height="178" rx="3" fill="#f59e0b" opacity="0.4"/>
  <rect x="650" y="170" width="30" height="180" rx="3" fill="#f59e0b" opacity="0.4"/>
  <!-- 95% line -->
  <line x1="450" y1="175" x2="700" y2="175" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.5"/>
  <text x="440" y="175" font-family="Arial" font-size="9" fill="#22c55e" opacity="0.5" text-anchor="end">95%</text>
  <!-- VS -->
  <text x="400" y="240" font-family="Arial" font-size="18" fill="#94a3b8" text-anchor="middle" opacity="0.4">VS</text>
  <!-- Bottom question -->
  <rect x="200" y="410" width="400" height="50" rx="10" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="440" font-family="Arial" font-size="12" fill="#ef4444" text-anchor="middle" opacity="0.6">Same accuracy, different reliability</text>
</svg>
