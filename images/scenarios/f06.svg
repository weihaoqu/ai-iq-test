<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="125" x2="800" y2="125" stroke="#6366f1" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="250" x2="800" y2="250" stroke="#6366f1" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="375" x2="800" y2="375" stroke="#6366f1" stroke-width="0.3" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="#6366f1" stroke-width="0.3" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="#6366f1" stroke-width="0.3" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="#6366f1" stroke-width="0.3" opacity="0.1"/>

  <!-- Central agent hub glow -->
  <circle cx="400" cy="250" r="90" fill="url(#glow)"/>
  <circle cx="400" cy="250" r="60" fill="url(#glow)" filter="url(#blur1)"/>

  <!-- Central agent hub -->
  <circle cx="400" cy="250" r="45" fill="none" stroke="url(#g1)" stroke-width="2.5"/>
  <circle cx="400" cy="250" r="30" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <circle cx="400" cy="250" r="12" fill="#6366f1" opacity="0.8"/>
  <!-- Inner agent pulses -->
  <circle cx="400" cy="250" r="20" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>

  <!-- Connection lines with arrows to tools -->
  <!-- Top-left: Database cylinder -->
  <line x1="365" y1="218" x2="220" y2="120" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <polygon points="220,120 228,128 232,118" fill="#6366f1" opacity="0.7"/>
  <!-- Reverse arrow -->
  <line x1="230" y1="130" x2="370" y2="222" stroke="#818cf8" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,4"/>

  <!-- Top-right: Document -->
  <line x1="435" y1="218" x2="580" y2="120" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <polygon points="580,120 572,128 568,118" fill="#6366f1" opacity="0.7"/>
  <line x1="570" y1="130" x2="430" y2="222" stroke="#818cf8" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,4"/>

  <!-- Bottom-left: Ticket/form -->
  <line x1="365" y1="282" x2="200" y2="390" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <polygon points="200,390 210,384 206,394" fill="#6366f1" opacity="0.7"/>
  <line x1="210" y1="385" x2="368" y2="278" stroke="#818cf8" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,4"/>

  <!-- Bottom-right: API/cloud -->
  <line x1="435" y1="282" x2="600" y2="390" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <polygon points="600,390 590,384 594,394" fill="#6366f1" opacity="0.7"/>
  <line x1="590" y1="385" x2="432" y2="278" stroke="#818cf8" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,4"/>

  <!-- Database cylinder (top-left) -->
  <ellipse cx="185" cy="95" rx="35" ry="12" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>
  <line x1="150" y1="95" x2="150" y2="135" stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>
  <line x1="220" y1="95" x2="220" y2="135" stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="185" cy="135" rx="35" ry="12" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="185" cy="115" rx="35" ry="12" fill="none" stroke="#818cf8" stroke-width="0.5" opacity="0.25"/>

  <!-- Document icon (top-right) -->
  <rect x="555" y="80" width="50" height="65" rx="3" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>
  <path d="M590,80 L605,95 L605,80 Z" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="565" y1="100" x2="595" y2="100" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="565" y1="110" x2="590" y2="110" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="565" y1="120" x2="585" y2="120" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="565" y1="130" x2="592" y2="130" stroke="#818cf8" stroke-width="1" opacity="0.3"/>

  <!-- Ticket/form icon (bottom-left) -->
  <rect x="155" y="370" width="55" height="45" rx="4" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>
  <rect x="163" y="380" width="10" height="10" rx="2" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="178" y1="385" x2="200" y2="385" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <rect x="163" y="396" width="10" height="10" rx="2" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="178" y1="401" x2="200" y2="401" stroke="#818cf8" stroke-width="1" opacity="0.3"/>

  <!-- API/cloud icon (bottom-right) -->
  <path d="M575,395 Q575,375 595,375 Q600,360 620,365 Q640,360 640,380 Q655,380 650,395 Z" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>
  <line x1="600" y1="400" x2="600" y2="420" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="615" y1="400" x2="615" y2="415" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="630" y1="400" x2="630" y2="420" stroke="#818cf8" stroke-width="1" opacity="0.3"/>

  <!-- Orbiting dots around central hub -->
  <circle cx="400" cy="190" r="3" fill="#818cf8" opacity="0.5"/>
  <circle cx="460" cy="250" r="3" fill="#818cf8" opacity="0.5"/>
  <circle cx="400" cy="310" r="3" fill="#818cf8" opacity="0.5"/>
  <circle cx="340" cy="250" r="3" fill="#818cf8" opacity="0.5"/>

  <!-- Decorative corner elements -->
  <path d="M30,30 L70,30 M30,30 L30,70" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M770,30 L730,30 M770,30 L770,70" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M30,470 L70,470 M30,470 L30,430" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M770,470 L730,470 M770,470 L770,430" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
</svg>
