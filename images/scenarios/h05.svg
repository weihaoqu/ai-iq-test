<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Long chat scroll -->
  <rect x="200" y="20" width="400" height="460" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <!-- Messages getting increasingly tangled -->
  <!-- Clear at top -->
  <rect x="230" y="40" width="160" height="25" rx="8" fill="#0ea5e9" opacity="0.4"/>
  <rect x="340" y="75" width="200" height="25" rx="8" fill="#334155" opacity="0.8"/>
  <rect x="230" y="110" width="180" height="25" rx="8" fill="#0ea5e9" opacity="0.35"/>
  <rect x="320" y="145" width="220" height="30" rx="8" fill="#334155" opacity="0.7"/>
  <!-- Getting messy in middle -->
  <rect x="230" y="185" width="200" height="25" rx="8" fill="#0ea5e9" opacity="0.25"/>
  <rect x="300" y="220" width="240" height="35" rx="8" fill="#334155" opacity="0.5"/>
  <rect x="230" y="265" width="220" height="30" rx="8" fill="#0ea5e9" opacity="0.2"/>
  <rect x="280" y="305" width="260" height="35" rx="8" fill="#334155" opacity="0.4"/>
  <!-- Very tangled at bottom -->
  <rect x="230" y="350" width="240" height="30" rx="8" fill="#0ea5e9" opacity="0.15"/>
  <rect x="260" y="390" width="280" height="35" rx="8" fill="#334155" opacity="0.3"/>
  <rect x="230" y="435" width="200" height="25" rx="8" fill="#0ea5e9" opacity="0.1"/>
  <!-- Tangled lines connecting messages -->
  <path d="M430 100 Q500 180 420 220 Q350 260 440 300 Q500 330 400 370 Q340 400 420 440" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.25" stroke-dasharray="4 3"/>
  <path d="M370 70 Q300 150 380 185 Q450 200 350 265 Q280 330 390 350" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.2" stroke-dasharray="4 3"/>
  <!-- Message counter -->
  <rect x="620" y="200" width="120" height="60" rx="10" fill="#334155" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="680" y="225" font-family="Arial" font-size="24" fill="#0ea5e9" text-anchor="middle" opacity="0.7">40+</text>
  <text x="680" y="245" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle" opacity="0.5">messages</text>
  <!-- Degradation indicator -->
  <rect x="620" y="300" width="120" height="80" rx="10" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="680" y="330" font-family="Arial" font-size="10" fill="#ef4444" text-anchor="middle" opacity="0.6">Quality</text>
  <rect x="640" y="340" width="80" height="8" rx="4" fill="#1e293b"/>
  <rect x="640" y="340" width="25" height="8" rx="4" fill="#ef4444" opacity="0.5"/>
  <text x="680" y="365" font-family="Arial" font-size="9" fill="#ef4444" text-anchor="middle" opacity="0.4">Degrading</text>
</svg>
