<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="100" y="50" width="600" height="120" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <rect x="100" y="50" width="600" height="28" rx="10" fill="#334155"/>
  <circle cx="120" cy="64" r="5" fill="#ef4444" opacity="0.7"/>
  <!-- pip install command -->
  <text x="130" y="105" font-family="monospace" font-size="13" fill="#22c55e" opacity="0.7">$ pip install python-dateutils2</text>
  <text x="130" y="135" font-family="monospace" font-size="12" fill="#ef4444" opacity="0.6">WARNING: Unverified package</text>
  <!-- Good package -->
  <rect x="140" y="220" width="220" height="120" rx="12" fill="#334155" stroke="#22c55e" stroke-width="2"/>
  <rect x="160" y="240" width="120" height="10" rx="3" fill="#22c55e" opacity="0.5"/>
  <text x="250" y="280" font-family="monospace" font-size="11" fill="#22c55e" text-anchor="middle">python-dateutil</text>
  <text x="250" y="300" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle" opacity="0.5">2.1M downloads/week</text>
  <circle cx="250" cy="322" r="10" fill="none" stroke="#22c55e" stroke-width="2"/>
  <polyline points="244,322 249,328 258,318" fill="none" stroke="#22c55e" stroke-width="2"/>
  <!-- Suspicious package -->
  <rect x="440" y="220" width="220" height="120" rx="12" fill="#334155" stroke="#ef4444" stroke-width="2"/>
  <rect x="460" y="240" width="140" height="10" rx="3" fill="#ef4444" opacity="0.5"/>
  <text x="550" y="280" font-family="monospace" font-size="11" fill="#ef4444" text-anchor="middle">python-dateutils2</text>
  <text x="550" y="300" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle" opacity="0.5">47 downloads/week</text>
  <polygon points="550,315 540,335 560,335" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="550" y="332" font-family="Arial" font-size="12" fill="#ef4444" text-anchor="middle">!</text>
  <!-- Skull/danger -->
  <circle cx="640" cy="240" r="12" fill="#ef4444" opacity="0.2"/>
  <!-- Arrow between them -->
  <path d="M370 280 L430 280" stroke="#94a3b8" stroke-width="1.5" opacity="0.3"/>
  <text x="400" y="275" font-family="Arial" font-size="16" fill="#94a3b8" text-anchor="middle" opacity="0.4">vs</text>
  <!-- Typosquatting label -->
  <rect x="250" y="390" width="300" height="50" rx="10" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="420" font-family="Arial" font-size="13" fill="#ef4444" text-anchor="middle" opacity="0.7">Typosquatting Risk</text>
</svg>
