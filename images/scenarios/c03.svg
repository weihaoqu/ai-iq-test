<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Laptop -->
  <rect x="120" y="220" width="200" height="130" rx="8" fill="#334155" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="130" y="230" width="180" height="100" rx="3" fill="#0f172a"/>
  <!-- Confidential data on screen -->
  <rect x="140" y="245" width="100" height="5" rx="2" fill="#ef4444" opacity="0.5"/>
  <rect x="140" y="258" width="80" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="140" y="270" width="120" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="140" y="282" width="90" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
  <text x="220" y="320" font-family="Arial" font-size="9" fill="#ef4444" text-anchor="middle" opacity="0.5">CONFIDENTIAL</text>
  <rect x="80" y="350" width="280" height="12" rx="3" fill="#475569"/>
  <!-- Data flow arrows upward -->
  <g stroke="#ef4444" stroke-width="2" opacity="0.5" stroke-dasharray="6 3">
    <line x1="220" y1="220" x2="300" y2="140"/>
    <line x1="250" y1="225" x2="380" y2="140"/>
    <line x1="280" y1="230" x2="440" y2="150"/>
  </g>
  <!-- Data particles -->
  <circle cx="260" cy="180" r="3" fill="#ef4444" opacity="0.6"/>
  <circle cx="320" cy="165" r="2" fill="#ef4444" opacity="0.4"/>
  <circle cx="370" cy="155" r="3" fill="#ef4444" opacity="0.5"/>
  <!-- Cloud -->
  <ellipse cx="500" cy="120" rx="120" ry="60" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
  <ellipse cx="450" cy="110" rx="60" ry="45" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="550" cy="110" rx="60" ry="45" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3"/>
  <text x="500" y="125" font-family="Arial" font-size="14" fill="#ef4444" text-anchor="middle" opacity="0.6">FREE AI</text>
  <!-- Warning shield -->
  <polygon points="500,250 460,290 500,380 540,290" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.6"/>
  <text x="500" y="320" font-family="Arial" font-size="36" fill="#ef4444" text-anchor="middle" opacity="0.5">!</text>
  <!-- Training data leak arrows out -->
  <g stroke="#ef4444" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 3">
    <line x1="570" y1="160" x2="650" y2="220"/>
    <line x1="590" y1="140" x2="680" y2="180"/>
  </g>
  <!-- Other users -->
  <circle cx="680" cy="250" r="20" fill="none" stroke="#94a3b8" stroke-width="1.5" opacity="0.4"/>
  <circle cx="720" cy="200" r="15" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.3"/>
</svg>
