<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Central AI node glow -->
  <circle cx="400" cy="250" r="100" fill="url(#glow)"/>

  <!-- Central AI node -->
  <circle cx="400" cy="250" r="50" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.7"/>
  <circle cx="400" cy="250" r="35" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="250" r="15" fill="#6366f1" opacity="0.5"/>
  <!-- AI inner pattern -->
  <circle cx="400" cy="250" r="25" fill="none" stroke="#818cf8" stroke-width="0.5" opacity="0.2"/>
  <line x1="400" y1="225" x2="400" y2="275" stroke="#818cf8" stroke-width="0.5" opacity="0.15"/>
  <line x1="375" y1="250" x2="425" y2="250" stroke="#818cf8" stroke-width="0.5" opacity="0.15"/>

  <!-- === STRUCTURED CONNECTORS (plug/socket style) === -->

  <!-- Connector to CRM (top-left) -->
  <line x1="365" y1="215" x2="290" y2="145" stroke="#6366f1" stroke-width="1.8" opacity="0.45"/>
  <!-- Plug socket at connection point -->
  <rect x="300" y="160" width="14" height="8" rx="2" fill="#6366f1" opacity="0.4" transform="rotate(-40 307 164)"/>
  <circle cx="340" cy="190" r="3" fill="#818cf8" opacity="0.4"/>
  <!-- CRM Box -->
  <rect x="165" y="90" width="100" height="70" rx="8" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.55"/>
  <rect x="165" y="90" width="100" height="70" rx="8" fill="#6366f1" opacity="0.04"/>
  <!-- CRM icon: person silhouette + lines -->
  <circle cx="200" cy="115" r="8" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <path d="M190,135 Q200,128 210,135" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="225" y1="112" x2="250" y2="112" stroke="#818cf8" stroke-width="1" opacity="0.25"/>
  <line x1="225" y1="122" x2="248" y2="122" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="225" y1="132" x2="245" y2="132" stroke="#818cf8" stroke-width="1" opacity="0.15"/>

  <!-- Connector to Inventory (top-right) -->
  <line x1="435" y1="215" x2="510" y2="145" stroke="#6366f1" stroke-width="1.8" opacity="0.45"/>
  <rect x="490" y="157" width="14" height="8" rx="2" fill="#6366f1" opacity="0.4" transform="rotate(40 497 161)"/>
  <circle cx="465" cy="188" r="3" fill="#818cf8" opacity="0.4"/>
  <!-- Inventory Box -->
  <rect x="535" y="90" width="100" height="70" rx="8" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.55"/>
  <rect x="535" y="90" width="100" height="70" rx="8" fill="#6366f1" opacity="0.04"/>
  <!-- Inventory icon: stacked boxes -->
  <rect x="560" y="115" width="20" height="16" rx="2" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <rect x="570" y="105" width="20" height="16" rx="2" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="112" x2="625" y2="112" stroke="#818cf8" stroke-width="1" opacity="0.25"/>
  <line x1="600" y1="122" x2="620" y2="122" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="600" y1="132" x2="622" y2="132" stroke="#818cf8" stroke-width="1" opacity="0.15"/>

  <!-- Connector to Email (bottom-left) -->
  <line x1="365" y1="285" x2="270" y2="365" stroke="#6366f1" stroke-width="1.8" opacity="0.45"/>
  <rect x="285" y="335" width="14" height="8" rx="2" fill="#6366f1" opacity="0.4" transform="rotate(40 292 339)"/>
  <circle cx="330" cy="315" r="3" fill="#818cf8" opacity="0.4"/>
  <!-- Email Box -->
  <rect x="145" y="345" width="100" height="70" rx="8" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.55"/>
  <rect x="145" y="345" width="100" height="70" rx="8" fill="#6366f1" opacity="0.04"/>
  <!-- Email icon: envelope -->
  <rect x="170" y="365" width="40" height="28" rx="3" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <path d="M170,365 L190,382 L210,365" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.35"/>
  <line x1="220" y1="372" x2="235" y2="372" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="220" y1="382" x2="232" y2="382" stroke="#818cf8" stroke-width="1" opacity="0.15"/>

  <!-- Connector to Calendar (bottom-right) -->
  <line x1="435" y1="285" x2="530" y2="365" stroke="#6366f1" stroke-width="1.8" opacity="0.45"/>
  <rect x="505" y="340" width="14" height="8" rx="2" fill="#6366f1" opacity="0.4" transform="rotate(-40 512 344)"/>
  <circle cx="475" cy="318" r="3" fill="#818cf8" opacity="0.4"/>
  <!-- Calendar/Service Box -->
  <rect x="555" y="345" width="100" height="70" rx="8" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.55"/>
  <rect x="555" y="345" width="100" height="70" rx="8" fill="#6366f1" opacity="0.04"/>
  <!-- Calendar icon -->
  <rect x="580" y="362" width="32" height="30" rx="3" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="580" y1="370" x2="612" y2="370" stroke="#818cf8" stroke-width="1" opacity="0.35"/>
  <line x1="588" y1="358" x2="588" y2="365" stroke="#818cf8" stroke-width="1.2" opacity="0.3"/>
  <line x1="604" y1="358" x2="604" y2="365" stroke="#818cf8" stroke-width="1.2" opacity="0.3"/>
  <!-- Grid dots -->
  <circle cx="590" cy="378" r="2" fill="#818cf8" opacity="0.25"/>
  <circle cx="600" cy="378" r="2" fill="#818cf8" opacity="0.25"/>
  <circle cx="590" cy="386" r="2" fill="#818cf8" opacity="0.2"/>
  <circle cx="600" cy="386" r="2" fill="#818cf8" opacity="0.2"/>
  <line x1="622" y1="372" x2="645" y2="372" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="622" y1="382" x2="640" y2="382" stroke="#818cf8" stroke-width="1" opacity="0.15"/>

  <!-- Protocol indicators — small structured shapes along connectors -->
  <rect x="325" y="178" width="6" height="6" rx="1" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>
  <rect x="470" y="178" width="6" height="6" rx="1" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>
  <rect x="315" y="318" width="6" height="6" rx="1" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>
  <rect x="478" y="320" width="6" height="6" rx="1" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>

  <!-- Decorative corner elements -->
  <path d="M30,30 L70,30 M30,30 L30,70" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M770,30 L730,30 M770,30 L770,70" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M30,470 L70,470 M30,470 L30,430" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M770,470 L730,470 M770,470 L770,430" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
</svg>
