<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#ec4899"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Corner brackets -->
  <path d="M30 60 L30 30 L60 30" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.3"/>
  <path d="M740 30 L770 30 L770 60" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.3"/>
  <path d="M30 440 L30 470 L60 470" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.3"/>
  <path d="M740 470 L770 470 L770 440" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.3"/>
  <!-- Warning shield -->
  <path d="M400 120 L460 160 L460 240 Q460 290 400 310 Q340 290 340 240 L340 160 Z" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.8"/>
  <path d="M400 120 L460 160 L460 240 Q460 290 400 310 Q340 290 340 240 L340 160 Z" fill="#f472b6" opacity="0.06"/>
  <!-- Exclamation mark -->
  <line x1="400" y1="170" x2="400" y2="250" stroke="#f472b6" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <circle cx="400" cy="275" r="4" fill="#f472b6" opacity="0.8"/>
  <!-- People icons (small circles) -->
  <circle cx="240" cy="200" r="12" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <line x1="240" y1="215" x2="240" y2="250" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <circle cx="560" cy="200" r="12" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <line x1="560" y1="215" x2="560" y2="250" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <circle cx="300" cy="320" r="12" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="300" y1="335" x2="300" y2="370" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
  <circle cx="500" cy="320" r="12" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="500" y1="335" x2="500" y2="370" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
  <!-- Surveillance lines from people to shield -->
  <line x1="255" y1="210" x2="340" y2="220" stroke="#f472b6" stroke-width="1" opacity="0.2" stroke-dasharray="4 4"/>
  <line x1="545" y1="210" x2="460" y2="220" stroke="#f472b6" stroke-width="1" opacity="0.2" stroke-dasharray="4 4"/>
  <line x1="315" y1="330" x2="370" y2="280" stroke="#f472b6" stroke-width="1" opacity="0.15" stroke-dasharray="4 4"/>
  <line x1="485" y1="330" x2="430" y2="280" stroke="#f472b6" stroke-width="1" opacity="0.15" stroke-dasharray="4 4"/>
  <!-- Glow -->
  <circle cx="400" cy="220" r="120" fill="none" stroke="#f472b6" stroke-width="1" opacity="0.1"/>
  <circle cx="400" cy="220" r="160" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.06"/>
</svg>