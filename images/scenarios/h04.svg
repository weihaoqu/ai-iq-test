<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Spreadsheet -->
  <rect x="100" y="60" width="600" height="340" rx="8" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <!-- Header row -->
  <rect x="100" y="60" width="600" height="35" fill="#0ea5e9" opacity="0.15"/>
  <text x="170" y="82" font-family="monospace" font-size="11" fill="#0ea5e9" opacity="0.7" text-anchor="middle">Name</text>
  <text x="300" y="82" font-family="monospace" font-size="11" fill="#0ea5e9" opacity="0.7" text-anchor="middle">Email</text>
  <text x="460" y="82" font-family="monospace" font-size="11" fill="#0ea5e9" opacity="0.7" text-anchor="middle">Purchase</text>
  <text x="600" y="82" font-family="monospace" font-size="11" fill="#0ea5e9" opacity="0.7" text-anchor="middle">Amount</text>
  <!-- Column lines -->
  <line x1="230" y1="60" x2="230" y2="400" stroke="#334155" stroke-width="1"/>
  <line x1="380" y1="60" x2="380" y2="400" stroke="#334155" stroke-width="1"/>
  <line x1="530" y1="60" x2="530" y2="400" stroke="#334155" stroke-width="1"/>
  <!-- Row lines -->
  <line x1="100" y1="95" x2="700" y2="95" stroke="#334155" stroke-width="0.5"/>
  <line x1="100" y1="130" x2="700" y2="130" stroke="#334155" stroke-width="0.5"/>
  <line x1="100" y1="165" x2="700" y2="165" stroke="#334155" stroke-width="0.5"/>
  <line x1="100" y1="200" x2="700" y2="200" stroke="#334155" stroke-width="0.5"/>
  <!-- PII columns highlighted red -->
  <rect x="100" y="95" width="130" height="270" fill="#ef4444" opacity="0.08"/>
  <rect x="230" y="95" width="150" height="270" fill="#ef4444" opacity="0.08"/>
  <!-- Data rows -->
  <g font-family="monospace" font-size="10" fill="#94a3b8" opacity="0.5">
    <text x="170" y="118" text-anchor="middle">John Smith</text>
    <text x="300" y="118" text-anchor="middle">john@email.com</text>
    <text x="460" y="118" text-anchor="middle">Widget Pro</text>
    <text x="600" y="118" text-anchor="middle">$49.99</text>
    <text x="170" y="153" text-anchor="middle">Jane Doe</text>
    <text x="300" y="153" text-anchor="middle">jane@corp.com</text>
    <text x="460" y="153" text-anchor="middle">Gadget Plus</text>
    <text x="600" y="153" text-anchor="middle">$129.00</text>
    <text x="170" y="188" text-anchor="middle">Bob Lee</text>
    <text x="300" y="188" text-anchor="middle">bob@mail.com</text>
    <text x="460" y="188" text-anchor="middle">Service Basic</text>
    <text x="600" y="188" text-anchor="middle">$29.99</text>
  </g>
  <!-- PII warning labels -->
  <rect x="120" y="370" width="80" height="20" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="160" y="384" font-family="Arial" font-size="9" fill="#ef4444" text-anchor="middle">PII</text>
  <rect x="260" y="370" width="80" height="20" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="300" y="384" font-family="Arial" font-size="9" fill="#ef4444" text-anchor="middle">PII</text>
  <!-- Shield/protection needed -->
  <rect x="250" y="420" width="300" height="50" rx="10" fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="400" y="450" font-family="Arial" font-size="12" fill="#0ea5e9" text-anchor="middle" opacity="0.6">Strip PII before sending to AI</text>
</svg>
