<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#818cf8"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Brain outline -->
  <ellipse cx="400" cy="230" rx="120" ry="100" fill="none" stroke="url(#g1)" stroke-width="3" opacity="0.8"/>
  <path d="M340 230 Q340 170 400 160 Q460 170 460 230" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <path d="M350 200 Q400 180 450 200" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="160" x2="400" y2="330" stroke="#6366f1" stroke-width="2" opacity="0.4"/>
  <!-- Neural network nodes -->
  <circle cx="340" cy="200" r="8" fill="#6366f1" opacity="0.9"/><circle cx="400" cy="180" r="8" fill="#818cf8"/><circle cx="460" cy="200" r="8" fill="#6366f1" opacity="0.9"/>
  <circle cx="350" cy="260" r="8" fill="#818cf8" opacity="0.8"/><circle cx="400" cy="250" r="8" fill="#6366f1"/><circle cx="450" cy="260" r="8" fill="#818cf8" opacity="0.8"/>
  <circle cx="370" cy="310" r="8" fill="#6366f1" opacity="0.7"/><circle cx="430" cy="310" r="8" fill="#6366f1" opacity="0.7"/>
  <!-- Connections -->
  <line x1="340" y1="200" x2="400" y2="250" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="460" y1="200" x2="400" y2="250" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="180" x2="350" y2="260" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="180" x2="450" y2="260" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="350" y1="260" x2="370" y2="310" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="450" y1="260" x2="430" y2="310" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <!-- Question marks -->
  <text x="260" y="180" font-family="Arial" font-size="48" fill="#6366f1" opacity="0.6">?</text>
  <text x="510" y="200" font-family="Arial" font-size="36" fill="#818cf8" opacity="0.5">?</text>
  <text x="300" y="350" font-family="Arial" font-size="40" fill="#6366f1" opacity="0.4">?</text>
  <text x="480" y="320" font-family="Arial" font-size="44" fill="#818cf8" opacity="0.5">?</text>
  <text x="220" y="280" font-family="Arial" font-size="30" fill="#6366f1" opacity="0.3">?</text>
  <!-- Glow effect -->
  <circle cx="400" cy="230" r="130" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <circle cx="400" cy="230" r="150" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.1"/>
</svg>
