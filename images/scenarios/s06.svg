<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Background subtle lines -->
  <line x1="200" y1="0" x2="200" y2="500" stroke="#6366f1" stroke-width="0.3" opacity="0.06"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="#6366f1" stroke-width="0.3" opacity="0.06"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="#6366f1" stroke-width="0.3" opacity="0.06"/>

  <!-- === CENTRAL DOCUMENT / SCROLL === -->
  <!-- Document body -->
  <rect x="310" y="90" width="180" height="260" rx="6" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.6"/>
  <rect x="310" y="90" width="180" height="260" rx="6" fill="#6366f1" opacity="0.04"/>

  <!-- Scroll curl at top -->
  <path d="M310,100 Q300,80 315,75 Q330,70 335,90" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <!-- Scroll curl at bottom -->
  <path d="M490,340 Q500,360 485,365 Q470,370 465,350" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>

  <!-- Document lines (regulation text) -->
  <line x1="335" y1="125" x2="465" y2="125" stroke="#818cf8" stroke-width="1.2" opacity="0.3"/>
  <line x1="335" y1="145" x2="455" y2="145" stroke="#818cf8" stroke-width="1" opacity="0.25"/>
  <line x1="335" y1="165" x2="460" y2="165" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="335" y1="185" x2="440" y2="185" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="335" y1="205" x2="465" y2="205" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="335" y1="225" x2="450" y2="225" stroke="#818cf8" stroke-width="1" opacity="0.18"/>
  <line x1="335" y1="245" x2="460" y2="245" stroke="#818cf8" stroke-width="1" opacity="0.15"/>
  <line x1="335" y1="265" x2="445" y2="265" stroke="#818cf8" stroke-width="1" opacity="0.15"/>

  <!-- Section divider -->
  <line x1="350" y1="280" x2="450" y2="280" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>

  <!-- Signature line area -->
  <line x1="360" y1="310" x2="440" y2="310" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="325" r="3" fill="#818cf8" opacity="0.2"/>

  <!-- === SHIELD / SEAL (overlapping document) === -->
  <path d="M400,370 L440,390 L440,430 Q440,455 400,470 Q360,455 360,430 L360,390 Z" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.65"/>
  <path d="M400,370 L440,390 L440,430 Q440,455 400,470 Q360,455 360,430 L360,390 Z" fill="#6366f1" opacity="0.08"/>
  <!-- Shield checkmark -->
  <path d="M387,420 L396,432 L415,408" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <!-- Shield glow -->
  <path d="M400,370 L440,390 L440,430 Q440,455 400,470 Q360,455 360,430 L360,390 Z" fill="none" stroke="#818cf8" stroke-width="3" opacity="0.08" filter="url(#glow1)"/>

  <!-- === SURROUNDING GOVERNANCE SYMBOLS === -->

  <!-- Checkmark 1 (top-left) -->
  <circle cx="200" cy="150" r="18" fill="none" stroke="#818cf8" stroke-width="1.2" opacity="0.35"/>
  <path d="M192,150 L198,158 L210,144" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <!-- Connection line -->
  <line x1="218" y1="150" x2="308" y2="150" stroke="#6366f1" stroke-width="0.8" opacity="0.15" stroke-dasharray="4,4"/>

  <!-- Checkmark 2 (top-right) -->
  <circle cx="600" cy="150" r="18" fill="none" stroke="#818cf8" stroke-width="1.2" opacity="0.35"/>
  <path d="M592,150 L598,158 L610,144" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <line x1="582" y1="150" x2="492" y2="150" stroke="#6366f1" stroke-width="0.8" opacity="0.15" stroke-dasharray="4,4"/>

  <!-- Checkmark 3 (left-mid) -->
  <circle cx="200" cy="260" r="18" fill="none" stroke="#818cf8" stroke-width="1.2" opacity="0.35"/>
  <path d="M192,260 L198,268 L210,254" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <line x1="218" y1="260" x2="308" y2="260" stroke="#6366f1" stroke-width="0.8" opacity="0.15" stroke-dasharray="4,4"/>

  <!-- Checkmark 4 (right-mid) -->
  <circle cx="600" cy="260" r="18" fill="none" stroke="#818cf8" stroke-width="1.2" opacity="0.35"/>
  <path d="M592,260 L598,268 L610,254" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <line x1="582" y1="260" x2="492" y2="260" stroke="#6366f1" stroke-width="0.8" opacity="0.15" stroke-dasharray="4,4"/>

  <!-- Pillar/column shapes (institutional feel) -->
  <!-- Left pillar -->
  <rect x="115" y="340" width="12" height="80" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.15"/>
  <line x1="111" y1="340" x2="131" y2="340" stroke="#818cf8" stroke-width="1.5" opacity="0.2"/>
  <line x1="111" y1="420" x2="131" y2="420" stroke="#818cf8" stroke-width="1.5" opacity="0.2"/>
  <!-- Right pillar -->
  <rect x="673" y="340" width="12" height="80" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.15"/>
  <line x1="669" y1="340" x2="689" y2="340" stroke="#818cf8" stroke-width="1.5" opacity="0.2"/>
  <line x1="669" y1="420" x2="689" y2="420" stroke="#818cf8" stroke-width="1.5" opacity="0.2"/>

  <!-- Gavel hint (top) -->
  <line x1="400" y1="50" x2="400" y2="80" stroke="#818cf8" stroke-width="1.5" opacity="0.25"/>
  <rect x="385" y="42" width="30" height="12" rx="3" fill="none" stroke="#818cf8" stroke-width="1.2" opacity="0.3"/>
  <ellipse cx="400" cy="82" rx="12" ry="5" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.15"/>

  <!-- Decorative corner elements -->
  <path d="M30,30 L70,30 M30,30 L30,70" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M770,30 L730,30 M770,30 L770,70" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M30,470 L70,470 M30,470 L30,430" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <path d="M770,470 L730,470 M770,470 L770,430" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
</svg>
