<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Tall PDF stack -->
  <rect x="160" y="30" width="200" height="420" rx="5" fill="#334155" stroke="#ec4899" stroke-width="2" opacity="0.8"/>
  <rect x="165" y="35" width="190" height="410" rx="3" fill="#1e293b"/>
  <!-- Page lines -->
  <g opacity="0.4">
    <rect x="180" y="50" width="140" height="4" rx="2" fill="#ec4899"/><rect x="180" y="62" width="120" height="4" rx="2" fill="#ec4899"/>
    <rect x="180" y="74" width="150" height="4" rx="2" fill="#ec4899"/><rect x="180" y="86" width="100" height="4" rx="2" fill="#ec4899"/>
    <rect x="180" y="98" width="130" height="4" rx="2" fill="#ec4899"/><rect x="180" y="110" width="140" height="4" rx="2" fill="#ec4899"/>
    <rect x="180" y="122" width="110" height="4" rx="2" fill="#ec4899"/><rect x="180" y="134" width="150" height="4" rx="2" fill="#ec4899"/>
  </g>
  <!-- 200 label -->
  <text x="260" y="470" font-family="Arial" font-size="14" fill="#ec4899" text-anchor="middle" opacity="0.6">200 pages</text>
  <!-- Arrow -->
  <path d="M380 250 L480 250" stroke="#ec4899" stroke-width="2" stroke-dasharray="6 3" opacity="0.5"/>
  <polygon points="480,244 496,250 480,256" fill="#ec4899" opacity="0.5"/>
  <!-- AI robot struggling -->
  <rect x="520" y="180" width="80" height="70" rx="15" fill="none" stroke="#ec4899" stroke-width="2.5"/>
  <circle cx="545" cy="210" r="6" fill="#ec4899"/><circle cx="575" cy="210" r="6" fill="#ec4899"/>
  <path d="M540 235 Q560 245 580 235" fill="none" stroke="#ec4899" stroke-width="2"/>
  <!-- Sweat drops -->
  <ellipse cx="510" cy="190" rx="4" ry="6" fill="#ec4899" opacity="0.4"/>
  <ellipse cx="615" cy="195" rx="4" ry="6" fill="#ec4899" opacity="0.4"/>
  <!-- Truncated output -->
  <rect x="480" y="290" width="200" height="120" rx="8" fill="#334155" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
  <rect x="500" y="310" width="140" height="5" rx="2" fill="#ec4899" opacity="0.5"/>
  <rect x="500" y="323" width="120" height="5" rx="2" fill="#ec4899" opacity="0.4"/>
  <rect x="500" y="336" width="100" height="5" rx="2" fill="#ec4899" opacity="0.3"/>
  <text x="580" y="385" font-family="Arial" font-size="24" fill="#ec4899" text-anchor="middle" opacity="0.5">...</text>
</svg>
